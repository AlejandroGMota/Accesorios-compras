name: Deploy to GitHub Pages

# Se ejecuta en cada push a main
on:
  push:
    branches:
      - main

# Permisos mínimos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultáneos; cancela el anterior si hay uno en curso
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reemplaza el placeholder %%FIREBASE_CONFIG%% en index.html con el
      # objeto JSON almacenado en el secret FIREBASE_CONFIG.
      # El secret debe contener el objeto tal como lo entrega Google Firebase,
      # por ejemplo: {"apiKey":"...","authDomain":"...",...}
      - name: Inject Firebase config
        run: sed -i "s|%%FIREBASE_CONFIG%%|${{ secrets.FIREBASE_CONFIG }}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Sube todo el directorio raíz como artefacto de Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
