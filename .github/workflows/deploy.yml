name: Deploy to GitHub Pages

# Se ejecuta en cada push a main
on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'style.css'
      - 'app.js'
      - 'secondary-styles.css'
      - 'fundas-lanzadas.html'
      - 'catalogo-buytiti/index.html'
      - 'catalogo-buytiti/productos.json'
      - 'catalogo-myshop/index.html'
      - 'catalogo-myshop/productos.json'
      - 'CNAME'
      - 'analytics/index.html'
      - 'analytics/analytics.js'
      - 'analytics/aliases.csv'
  # Se dispara también cuando algún workflow de catálogo termina
  workflow_run:
    workflows: ["Actualizar catálogo BuyTiti", "Actualizar catálogo my-shop.mx"]
    types:
      - completed
    branches:
      - main

# Permisos mínimos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultáneos; cancela el anterior si hay uno en curso
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reemplaza el placeholder %%FIREBASE_CONFIG%% en index.html con el
      # objeto JSON almacenado en el secret FIREBASE_CONFIG.
      # Se usa Python para evitar problemas con saltos de línea en sed.
      - name: Inject Firebase config
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          python3 -c "
          import os
          config = os.environ['FIREBASE_CONFIG'].strip()
          targets = ['index.html', 'analytics/index.html']
          for path in targets:
              with open(path, 'r') as f:
                  content = f.read()
              content = content.replace('%%FIREBASE_CONFIG%%', config)
              with open(path, 'w') as f:
                  f.write(content)
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Sube todo el directorio raíz como artefacto de Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
