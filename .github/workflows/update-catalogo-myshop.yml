name: Actualizar catálogo my-shop.mx

on:
  # Solo manual desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      # Ejecuta el scraper; escribe el resultado en catalogo-myshop/productos.json
      - name: Ejecutar scraper
        working-directory: catalogo-myshop/scraper
        run: go run .

      # Si el JSON cambió, hace commit y push directamente a main
      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalogo-myshop/productos.json
          if git diff --cached --quiet; then
            echo "Sin cambios en el catálogo."
          else
            git commit -m "chore: actualizar catálogo my-shop.mx $(date +'%Y-%m-%d')"
            git push
          fi
